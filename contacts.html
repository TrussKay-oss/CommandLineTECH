<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

.container{
    width:80%;
    margin:auto;
    padding:30px;
}

.contact-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
}

button{
    background:#0a192f;
    color:white;
    padding:12px 25px;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#00c6ff;
}
</style>
</head>
<body>

<div class="container">

    <div class="contact-box">
        <h1>Contact Us</h1>

        <p><strong>Phone:</strong> +265 991 091 894</p>
        <p><strong>Email:</strong> commandlinetech@gmail.com</p>
        <p><strong>Location:</strong> Blantyre, Malawi</p>

        <h2>Send Us A Message</h2>

        <form>
            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <textarea rows="5" placeholder="Your Message"></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

</div>

</body>
</html>
