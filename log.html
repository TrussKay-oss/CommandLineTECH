<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0a192f;
    font-family:Arial,sans-serif;
}

.login-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    color:#0a192f;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#0a192f;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#00c6ff;
}

.links{
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="login-box">

    <h2>Command Line Tech Solutions</h2>

    <form>
        <input type="email" placeholder="Email Address" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p><a href="login.html">Create Account</a></p>
    </div>

</div>

</body>
</html>
